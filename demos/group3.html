<!DOCTYPE html>
<html>
    <head>
        <title> The Best Pizza </title>
        <style>
            body {
                background-color: rgb(255, 220, 140);
                color: rgb(169, 2, 2);
                font-weight: bold;
                text-align: center;
                background-image: url('https://i.pinimg.com/originals/08/8e/05/088e05bb4e0ab5f67758eeadf7ced571.gif');
            }
            h1 {
                font-size: 75px;
                -webkit-text-stroke: 2px black;
            }
            h2 {
                font-size: 40px;
                font-style: italic;
                margin-top: -50px;
                -webkit-text-stroke: 2px black;
            }
            p {
                font-size: 20px;
                -webkit-text-stroke: 1px black;
            }
            img {
                width: 65%;
                height: 65%;
                border-radius: 50%;
                animation: pizzaAnimation 3s infinite ease-in-out;
                animation-delay: 0s;

            @keyframes pizzaAnimation {
                0% { transform: rotateY(0deg); }
                100% { transform: rotateY(360deg); }
            }

    </head>
