<!DOCTYPE html>
<html>
    <head>
        <style> 
            div {
                width: 100px;
                height: 100px;
                background-color: red;
                position: relative;
                animation: myAnimation 4s ease-in-out infinite;
            }

            h2 {
                animation-name: funnyText;
                animation-duration: 2s;
                animation-iteration-count: infinite;
                animation-timing-function: cubic-bezier(0, 0, 1, 1);
                -webkit-animation-timing-function: ease-in-out;
            }

            .rainbow{
                background-image: repeating-linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red); 
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                animation: rainbow_animation 6s ease-in-out infinite;
                background-size: 400% 100%;
            }

            @keyframes rainbow_animation {
                0%,100% {background-position: 0 0; font-size: 50px;}
                
                50% {background-position: 100% 0; font-size: 100px;}
            }
        

            @keyframes funnyText {
                0% {color: red; font-size: 50px;}
                25% {color: blue; font-size: 75px; font-weight: bold;}
                50% {color: green; font-size: 100px; font-weight: bolder;}
                75% {color: blue; font-size: 75px; font-weight: bold;}
                100% {color: red; font-size: 50px;}
            }

            @keyframes myAnimation {
                0%   {background-color:red; left:0px; top:0px;}
                25%  {background-color:yellow; left:200px; top:0px;}
                50%  {background-color:blue; left:200px; top:200px;}
                75%  {background-color:green; left:0px; top:200px;}
                100% {background-color:red; left:0px; top:0px;}
            }

            button {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 10px 20px;
                font-size: 20px;
                background-color: #4CAF50;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1 style="text-align: center; position: absolute;" class="rainbow"> The coolest website of All Time </h1>
        <img src="maxwell-maxwell-spin.gif" alt="maxwell"></bodyimg>
        <button style="text-align: center;">
            <a href="ufosc.org" target="_blank"> Click Here </a>
        </button>
    </body>
</html>
